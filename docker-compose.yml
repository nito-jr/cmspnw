version: '3.9'

services:
  web:
    build: .
    container_name: cmsp_web
    ports:
      - "80:80"
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-cmsp_user}
      - DB_PASS=${DB_PASS:-cmsp_password}
      - DB_NAME=${DB_NAME:-cmsp_db}
    volumes:
      - ./uploads:/var/www/html/uploads
      - ./php:/var/www/html/php
      - ./css:/var/www/html/css
      - ./*.html:/var/www/html/
    depends_on:
      - db
    networks:
      - cmsp_network
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: cmsp_db
    environment:
      - POSTGRES_PASSWORD=${DB_PASS:-cmsp_password}
      - POSTGRES_DB=${DB_NAME:-cmsp_db}
      - POSTGRES_USER=${DB_USER:-cmsp_user}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    ports:
      - "5432:5432"
    networks:
      - cmsp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cmsp_user} -d ${POSTGRES_DB:-cmsp_db} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:

networks:
  cmsp_network:
    driver: bridge
