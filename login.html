<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>CMSP - Login</title>
    <link rel="icon" href="/uploads/cmsp.png" type="image/png">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-card">
        <a href="index.html" class="auth-back"><i class="fas fa-arrow-left"></i> Back to home</a>
        <div class="auth-logo">CMSP</div>
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Council for Medico Sanitary Professionals</p>
        </div>
        <form id="loginForm" onsubmit="login(); return false;">
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" class="form-control" placeholder="Email Address" required>
                </div>
            </div>
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('password',this)"></i>
                </div>
            </div>

            <div class="form-group captcha-group">
                <label for="captchaAnswer" class="captcha-label">
                    <i class="fas fa-shield-halved"></i>
                    Quick check — solve: <span id="captchaQuestion">loading…</span>
                    <button type="button" id="captchaRefresh" class="captcha-refresh" title="Get a new question" onclick="loadCaptcha()">
                        <i class="fas fa-rotate"></i>
                    </button>
                </label>
                <input type="text" id="captchaAnswer" class="form-control" inputmode="numeric" autocomplete="off" placeholder="Your answer" required>
            </div>

            <button type="submit" id="loginBtn" class="btn btn-primary btn-block" style="margin-top:10px;">
                Login <i class="fas fa-arrow-right" style="margin-left:5px;"></i>
            </button>
        </form>
        <p id="msg" style="color:red;margin-top:15px;text-align:center;"></p>
        <div style="margin-top:20px;border-top:1px solid #eee;padding-top:15px;text-align:center;">
            <small style="color:var(--text-light);">New Member? <a href="register.html" style="color:var(--secondary-color);text-decoration:none;font-weight:bold;">Apply Here</a></small>
        </div>
    </div>
    <script>
        function togglePassword(id, icon) {
            var x = document.getElementById(id);
            x.type = x.type==="password" ? "text" : "password";
            icon.classList.toggle("fa-eye"); icon.classList.toggle("fa-eye-slash");
        }

        function loadCaptcha() {
            document.getElementById('captchaQuestion').innerText = 'loading…';
            document.getElementById('captchaAnswer').value = '';
            fetch('php/get_captcha.php')
                .then(r => r.json())
                .then(d => { document.getElementById('captchaQuestion').innerText = d.question; })
                .catch(() => { document.getElementById('captchaQuestion').innerText = 'unavailable — retry'; });
        }
        loadCaptcha();

        function login() {
            var msg = document.getElementById('msg');
            var btn = document.getElementById('loginBtn');
            msg.innerText = '';
            btn.disabled = true; btn.innerHTML = 'Logging in...';

            fetch('php/login.php', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    captcha: document.getElementById('captchaAnswer').value
                })
            })
            .then(r=>r.json())
            .then(data=>{
                btn.disabled = false; btn.innerHTML = 'Login <i class="fas fa-arrow-right" style="margin-left:5px;"></i>';
                if (data.status==='success') {
                    window.location.href = data.role==='member' ? 'dashboard_member.html' : 'dashboard_operator.html';
                } else {
                    msg.innerText = data.message;
                    if (data.refresh_captcha) loadCaptcha();
                }
            })
            .catch(()=>{
                btn.disabled = false; btn.innerHTML = 'Login <i class="fas fa-arrow-right" style="margin-left:5px;"></i>';
                msg.innerText = 'Connection error. Check server.';
                loadCaptcha();
            });
        }
    </script>
</body>
</html>
