<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>CMSP - New Application</title>
    <link rel="icon" href="/uploads/cmsp.png" type="image/png">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .success-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            animation: fadeInOverlay 0.2s ease-out;
        }
        .success-overlay.active { display: flex; }
        @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
        .success-card {
            background: #ffffff;
            width: 380px;
            max-width: 90%;
            border-radius: 20px;
            padding: 36px 32px;
            text-align: center;
            box-shadow: var(--card-shadow);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .success-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--success-color), #34d399);
            color: #fff;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 18px rgba(16, 185, 129, 0.3);
        }
        .success-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
            letter-spacing: -0.4px;
        }
        .success-card p {
            font-size: 0.9rem;
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 22px;
        }
    </style></head>
<body class="register-body">
    <div class="auth-card">
        <div class="auth-logo"><i class="fas fa-user-plus"></i></div>
        <div class="auth-header">
            <h2>Member Application</h2>
            <p>Council for Medico Sanitary Professionals</p>
        </div>
        <form id="regForm">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="name" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" id="regPassword" class="form-control" placeholder="Create password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('regPassword',this)"></i>
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" class="form-control" placeholder="+237...">
                </div>
                <div class="form-group">
                    <label>Profession *</label>
                    <select name="profession" class="form-control" required>
                        <option value="">Select...</option>
                        <option>Nurse</option><option>Lab Tech</option><option>Pharmacy Tech</option>
                        <option>Midwife</option><option>Imaging</option><option>Other</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" class="form-control" placeholder="City, Quarter">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>School Attended *</label>
                    <input type="text" name="school" class="form-control" placeholder="e.g. Yaounde Nursing School" required>
                </div>
                <div class="form-group">
                    <label>Year of Graduation *</label>
                    <input type="number" name="year_graduation" class="form-control" placeholder="2020" required>
                </div>
            </div>
            <div class="form-group">
                <label>Photo (Optional)</label>
                <input type="file" name="photo" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Submit Application</button>
        </form>
        <p id="resMsg" style="text-align:center;margin-top:15px;"></p>
        <div style="margin-top:15px;text-align:center;">
            <small style="color:var(--text-light);">Already applied? <a href="login.html" style="color:var(--secondary-color);text-decoration:none;font-weight:bold;">Login Here</a></small>
        </div>
    </div>

    <!-- Success Popup -->
    <div id="successModal" class="success-overlay">
        <div class="success-card">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h2>Application Submitted!</h2>
            <p id="successText">Your membership application has been received.</p>
            <button class="btn btn-primary btn-block" onclick="closeSuccessModal()">Great, thanks!</button>
        </div>
    </div>

    <script>
        function togglePassword(id, icon) {
            var x = document.getElementById(id);
            x.type = x.type==="password" ? "text" : "password";
            icon.classList.toggle("fa-eye"); icon.classList.toggle("fa-eye-slash");
        }
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var btn=this.querySelector('button[type="submit"]'), msg=document.getElementById('resMsg');
            btn.disabled=true; btn.innerHTML='Processing...';
            fetch('php/register.php', {method:'POST', body:new FormData(this)})
            .then(r=>r.json())
            .then(data=>{
                btn.disabled=false; btn.innerHTML='Submit Application';
                if(data.status==='success'){
                    msg.innerText='';
                    document.getElementById('successText').innerText = data.message;
                    document.getElementById('successModal').classList.add('active');
                    this.reset();
                } else {
                    msg.innerText=data.message;
                    msg.style.color='var(--danger-color)';
                }
            })
            .catch(()=>{ btn.disabled=false; btn.innerHTML='Submit Application'; msg.innerText='Connection error.'; msg.style.color='red'; });
        });

        function closeSuccessModal(){
            document.getElementById('successModal').classList.remove('active');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
